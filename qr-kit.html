
<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Halal Tour · Kit QR</title><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script></head><body style="font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px"><h2>Générateur QR · Halal Tour</h2><label>Nom du partenaire</label><br><input id="name" style="width:100%;padding:10px;margin:10px 0" placeholder="Ex: Office de tourisme de Lyon"><br><label>Type</label><br><select id="type" style="width:100%;padding:10px;margin:10px 0"><option value="office-tourisme">Office de tourisme</option><option value="hotel">Hôtel</option><option value="resto">Restaurant</option></select><br><button onclick="gen()" style="background:#1B4D3E;color:white;padding:12px 24px;border:none;border-radius:8px;font-size:16px;width:100%">Générer le QR code</button><div id="result" style="margin-top:30px"></div><script>function gen(){var n=document.getElementById('name').value;var t=document.getElementById('type').value;if(!n){alert('Merci de saisir un nom');return;}var url='https://roaring-bunny-21d96b.netlify.app?utm_source='+n.toLowerCase().replace(/\s+/g,'-')+'&utm_medium='+t+'&utm_campaign=halal-tour-kit';document.getElementById('result').innerHTML='<p><b>Lien :</b> '+url+'</p><div id="qr"></div>';new QRCode(document.getElementById('qr'),{text:url,width:200,height:200,colorDark:'#1B4D3E'});}</script></body></html>
